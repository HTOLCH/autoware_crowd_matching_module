# Campus-tuned surround obstacle checker.
# Disables pedestrian/bicycle departure check — on a shared pathway,
# these are always present and would permanently block vehicle departure.
/**:
  ros__parameters:
    pointcloud:
      enable_check: false
      surround_check_front_distance: 0.5
      surround_check_side_distance: 0.5
      surround_check_back_distance: 0.5
    unknown:
      enable_check: false
      surround_check_front_distance: 0.5
      surround_check_side_distance: 0.5
      surround_check_back_distance: 0.5
    car:
      enable_check: true
      surround_check_front_distance: 0.5
      surround_check_side_distance: 0.0
      surround_check_back_distance: 0.0
    truck:
      enable_check: true
      surround_check_front_distance: 0.5
      surround_check_side_distance: 0.0
      surround_check_back_distance: 0.0
    bus:
      enable_check: true
      surround_check_front_distance: 0.5
      surround_check_side_distance: 0.0
      surround_check_back_distance: 0.0
    trailer:
      enable_check: true
      surround_check_front_distance: 0.5
      surround_check_side_distance: 0.0
      surround_check_back_distance: 0.0
    motorcycle:
      enable_check: true
      surround_check_front_distance: 0.5
      surround_check_side_distance: 0.0
      surround_check_back_distance: 0.5
    bicycle:
      enable_check: false  # TUNED: was true — always present on shared pathway
      surround_check_front_distance: 0.5
      surround_check_side_distance: 0.5
      surround_check_back_distance: 0.5
    pedestrian:
      enable_check: false  # TUNED: was true — always present on shared pathway
      surround_check_front_distance: 0.5
      surround_check_side_distance: 0.5
      surround_check_back_distance: 0.5

    surround_check_hysteresis_distance: 0.1
    state_clear_time: 0.2
    stop_state_ego_speed: 0.1
    publish_debug_footprints: true
    debug_footprint_label: "car"
