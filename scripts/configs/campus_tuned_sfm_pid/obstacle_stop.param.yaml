# CAMPUS-TUNED + crowd-matching obstacle_stop parameters.
# Config C: Reduced margins WITH crowd-matching module active.
# Crowd-matching module provides velocity decisions for pedestrian interaction.
# Stock values: stop_margin=5.0, terminal_stop_margin=3.0, min_behavior_stop_margin=3.0
/**:
  ros__parameters:
    obstacle_stop:
      option:
        ignore_crossing_obstacle: true
        suppress_sudden_stop: false

      stop_planning:
        stop_margin : 1.2 # [m] TUNED: was 5.0 — further reduced for smoother flow on shared pathway
        terminal_stop_margin : 0.5 # [m] TUNED: was 3.0 — further reduced
        min_behavior_stop_margin: 0.5 # [m] TUNED: was 3.0 — further reduced
        behavior_stop_margin_hold_time: 2.0 # [s]

        max_negative_velocity: -100.0 # [m/s]
        stop_margin_opposing_traffic: 5.0 # TUNED: was 10.0 — opposing peds on shared path are normal
        effective_deceleration_opposing_traffic: 4.0

        min_on_duration: 0.3
        min_off_duration: 1.0
        update_distance_th: 0.5

        hold_stop_velocity_threshold: 0.01
        hold_stop_distance_threshold: 0.3
        pointcloud_suppression_distance_margin: 0.2

        stop_on_curve:
          enable_approaching: false
          additional_stop_margin: 1.5 # [m] TUNED: was 3.0
          min_stop_margin: 1.5 # [m] TUNED: was 3.0

        object_type_specified_params:
          types:
            - "default"
            - "unknown"
          unknown:
            limit_min_acc: -1.2
            sudden_object_acc_threshold: -1.1
            sudden_object_dist_threshold: 1000.0
            abandon_to_stop: false

        rss_params:
          use_rss_stop: true
          two_wheel_objects_deceleration: -3.0 # [m/ss]
          vehicle_objects_deceleration: -1.2 # [m/ss]
          no_wheel_objects_deceleration: -5.0 # [m/ss] TUNED: was -10.0 — less aggressive assumption for peds
          pointcloud_deceleration: -1.0 # [m/ss]
          velocity_offset: -1.0 # [m/s]

        obstacle_velocity_threshold_enter_fixed_stop: 3.0
        obstacle_velocity_threshold_exit_fixed_stop: 3.5

      obstacle_filtering:
        check_inside:
          default: true
          pedestrian: true # Re-enabled as emergency safety net (tight margins)
          pointcloud: false
        check_outside:
          default: true
          pedestrian: true # Re-enabled as emergency safety net (tight margins)
          unknown: false

        trim_trajectory:
          enable_trimming:
            default: false
            pointcloud: true
          min_trajectory_length: 30.0
          braking_distance_scale_factor: 1.5

        lateral_margin:
          nominal:
            default: 0.2 # TUNED: was 0.3 — tighter for narrow shared pathway
            unknown: 0.2
            pointcloud: 0.2
          additional:
            wheel_off_track_scale:
              default: 0.0
            is_moving_threshold_velocity: 0.5
            is_stop_obstacle:
              default: 0.0
            is_moving_obstacle:
              default: 0.0

        detection_height:
          top_limit:
            default: 50.0
            unknown: 1.0
          bottom_limit: -50.0

        min_object_length: 0.1

        min_velocity_to_reach_collision_point: 2.0
        stop_obstacle_hold_time_threshold : 1.0

        outside_obstacle:
          estimation_time_horizon: 1.0
          max_lateral_velocity: 5.0
          min_longitudinal_velocity: -8.0
          max_moving_direction_angle: 2.44
          deceleration:
            default: 0.0
            pedestrian: 1.0
            bicycle: 2.0

        crossing_obstacle:
          collision_time_margin : 0.3 # [s] TUNED: was 1.0 — further reduced for smoother flow
          traj_angle_threshold: 0.523599

      pointcloud_segmentation:
        time_series_association:
          max_time_diff: 0.35
          min_velocity: -5.0
          max_velocity: 30.0
          position_diff: 1.0
        velocity_estimation:
          use_estimated_velocity: false
          min_clamp_velocity: 0.0
          max_clamp_velocity: 20.0
          required_velocity_count: 5
          lpf_gain: 0.9
        height_margin:
          margin_from_top: 0.5
          margin_from_bottom: 0.5
