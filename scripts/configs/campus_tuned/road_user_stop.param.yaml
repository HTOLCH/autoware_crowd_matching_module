# CAMPUS-TUNED road_user_stop parameters (no crowd-matching module).
# Config B: Reduced margins for shared campus pathway, but no social force model.
# Demonstrates improvement from parameter tuning alone vs stock.
# Stock values: default_margin=5.0, terminal_margin=3.0, minimum_margin=3.0
/**:
  ros__parameters:
    road_user_stop:
      option:
        suppress_sudden_stop: true

      stop_planning:
        longitudinal_margin:
          default_margin: 0.8 # [m] TUNED: was 5.0 — further reduced for smoother flow on shared pathway
          terminal_margin: 0.5 # [m] TUNED: was 3.0 — further reduced
          minimum_margin: 0.3 # [m] TUNED: was 3.0 — further reduced for smoother flow

        opposing_traffic:
          stop_margin: 5.0 # TUNED: was 10.0 — opposing peds on shared path are normal
          max_negative_velocity: -0.1 # [m/s]
          min_velocity_for_stop_planning: 2.77 # [m/s]
          effective_deceleration: 4.0

        hold_stop_velocity_threshold: 0.01
        hold_stop_distance_threshold: 0.3

        stop_on_curve:
          enable_approaching: false
          additional_stop_margin: 1.5 # [m] TUNED: was 3.0
          min_stop_margin: 2.0 # [m] TUNED: was 6.0

        # Common parameters for all object types
        limit_min_acc: -2.5
        sudden_object_acc_threshold: -1.0
        sudden_object_dist_threshold: 1000.0
        abandon_to_stop: false

      obstacle_filtering:
        object_type:
          pedestrian: true
          bicycle: true
          motorcycle: false
          unknown: false

        # Trajectory-based filtering
        trajectory_lateral_margin: 0.3 # [m] TUNED: was 1.0 — further reduced for smoother flow

        # Wrong-way detection
        opposing_traffic_detection:
          enable: true
          angle_threshold: 150.0
          min_speed_threshold: 0.5

        # Intersection filtering
        intersection:
          exclude: false
        # Special area filtering
        crosswalk:
          exclude: true
          margin: 1.0

        # Temporal filtering
        min_detection_duration: 0.5 # [s] TUNED: was 0.1 — less reactive to brief detections for smoother flow
        lost_object_retention_duration: 1.0 # [s] TUNED: was 2.0 — faster recovery after ped passes

        polygon_expansion_length: 0.3 # [m] TUNED: was 0.5

      # stopped object tracking parameters
      stopped_object_tracking:
        stopped_velocity_threshold: 0.5
        stopped_position_tolerance: 0.3
        ego_reached_wall_distance_threshold: 0.5
        stopped_duration_after_ego_arrival: 2.0 # [s] TUNED: was 3.0 — faster re-evaluation
